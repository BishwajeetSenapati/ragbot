{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — DocMind</title>
    <link rel="stylesheet" href="{% static 'rag_app/css/style.css' %}">
</head>
<body>

<div class="auth-page">
    <div class="auth-box">
        <div class="auth-brand">📄 DocMind</div>
        <h1>Welcome back</h1>
        <p class="auth-sub">Log in to chat with your documents</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>

            <div class="alert" id="alertBox" style="display:none;"></div>

            <button type="submit" class="btn-primary btn-full" id="loginBtn">
                Log In
            </button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a href="{% url 'signup_page' %}">Sign up</a>
        </p>
    </div>
</div>

<script>
const form     = document.getElementById('loginForm');
const alertBox = document.getElementById('alertBox');
const loginBtn = document.getElementById('loginBtn');

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        document.cookie.split(';').forEach(cookie => {
            const c = cookie.trim();
            if (c.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(c.substring(name.length + 1));
            }
        });
    }
    return cookieValue;
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    loginBtn.disabled    = true;
    loginBtn.textContent = 'Logging in...';
    alertBox.style.display = 'none';

    try {
        const res  = await fetch('/api/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (data.success) {
            window.location.href = '/';
        } else {
            alertBox.textContent   = data.error;
            alertBox.className     = 'alert error';
            alertBox.style.display = 'block';
            loginBtn.disabled      = false;
            loginBtn.textContent   = 'Log In';
        }

    } catch (err) {
        alertBox.textContent   = 'Something went wrong. Try again.';
        alertBox.className     = 'alert error';
        alertBox.style.display = 'block';
        loginBtn.disabled      = false;
        loginBtn.textContent   = 'Log In';
    }
});
</script>

</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign Up — DocMind</title>
    <link rel="stylesheet" href="{% static 'rag_app/css/style.css' %}">
</head>
<body>

<div class="auth-page">
    <div class="auth-box">
        <div class="auth-brand">📄 DocMind</div>
        <h1>Create your account</h1>
        <p class="auth-sub">Start chatting with your documents</p>

        <form id="signupForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" autocomplete="email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required autocomplete="new-password">
                <span class="form-hint">At least 6 characters</span>
            </div>

            <div class="alert" id="alertBox" style="display:none;"></div>

            <button type="submit" class="btn-primary btn-full" id="signupBtn">
                Create Account
            </button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="{% url 'login_page' %}">Log in</a>
        </p>
    </div>
</div>

<script>
const form      = document.getElementById('signupForm');
const alertBox  = document.getElementById('alertBox');
const signupBtn = document.getElementById('signupBtn');

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        document.cookie.split(';').forEach(cookie => {
            const c = cookie.trim();
            if (c.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(c.substring(name.length + 1));
            }
        });
    }
    return cookieValue;
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    signupBtn.disabled    = true;
    signupBtn.textContent = 'Creating account...';
    alertBox.style.display = 'none';

    try {
        const res  = await fetch('/api/signup/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify({ username, email, password }),
        });

        const data = await res.json();

        if (data.success) {
            window.location.href = '/';
        } else {
            alertBox.textContent   = data.error;
            alertBox.className     = 'alert error';
            alertBox.style.display = 'block';
            signupBtn.disabled     = false;
            signupBtn.textContent  = 'Create Account';
        }

    } catch (err) {
        alertBox.textContent   = 'Something went wrong. Try again.';
        alertBox.className     = 'alert error';
        alertBox.style.display = 'block';
        signupBtn.disabled     = false;
        signupBtn.textContent  = 'Create Account';
    }
});
</script>

</body>
</html>
